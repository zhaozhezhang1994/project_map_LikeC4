# ── 公开块: LAN 可达 (map.local → :3002)。只读状态 + 地图, 绝不暴露控制 ──
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: LikeC4 build 是单页应用,深链(/view/xxx)要回落 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反代 /api/ 到 sidecar 状态服务 (project-map-api:7004)。不剥路径 →
    # /api/status 原样转发到后端 /api/status。sidecar 不发布端口到宿主,只经此可达。
    location /api/ {
        proxy_pass http://project-map-api:7004;
    }

    # 🔒 控制端点严禁走公开块 (LAN 打不到)。显式 404, 不漏到 sidecar。
    location /control/ {
        return 404;
    }
}

# ── 控制块: 仅宿主本机 loopback (compose 发布为 127.0.0.1:7099)。一键重启等写操作 ──
# 容器内 listen 7099; 宿主只 127.0.0.1:7099:7099 映射 → LAN 不可达。
# sidecar 自身再加 token 鉴权 + 默认关 + node 白名单 (纵深防御)。
server {
    listen 7099;
    server_name _;

    # 控制动作 → sidecar
    location /control/ {
        proxy_pass http://project-map-api:7004;
    }
    # 控制页要读状态 → 也代到 sidecar (仅本机, 只读无妨)
    location /api/ {
        proxy_pass http://project-map-api:7004;
    }
    # 极简控制页 (control.html 在 /usr/share/nginx, 不在 :80 的 html 根下 → LAN 看不到)
    location / {
        root /usr/share/nginx;
        try_files /control.html =404;
    }
}
